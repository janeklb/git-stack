name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Homebrew release metadata
        run: scripts/release-homebrew-metadata.sh "${{ github.ref_name }}" dist/homebrew-release.json

      - name: Upload Homebrew release metadata
        run: gh release upload "${{ github.ref_name }}" dist/homebrew-release.json#homebrew-release.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

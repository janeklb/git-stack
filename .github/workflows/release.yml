name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

      - name: Generate Homebrew release metadata
        run: scripts/release-homebrew-metadata.sh "${{ github.ref_name }}" homebrew-release.json

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open Homebrew tap update issue
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          source_url="$(jq -r '.source_url' homebrew-release.json)"
          sha256="$(jq -r '.sha256' homebrew-release.json)"
          scripts/open-homebrew-tap-issue.sh janeklb/homebrew-tap "${{ github.ref_name }}" "$source_url" "$sha256"
